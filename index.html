<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Art of WebGL Website | Yunus Emre G&uuml;rlek</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A static WebGL session gallery by Yunus Emre G&uuml;rlek / SoftBridge Solutions.">
    <link rel="stylesheet" href="./common/style.css">
    <style>
      body {
        position: static;
        min-height: 100%;
        height: auto;
        background: #080b0f;
        color: #f7fbff;
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 96px 0 48px;
      }

      .intro {
        max-width: 760px;
        margin-bottom: 34px;
      }

      .intro h1 {
        margin: 0 0 12px;
        font-size: clamp(34px, 7vw, 72px);
        line-height: 0.95;
        font-weight: 760;
        letter-spacing: 0;
      }

      .intro p {
        margin: 0;
        color: rgba(247, 251, 255, 0.72);
        font-size: 16px;
        line-height: 1.7;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 14px;
      }

      .gallery a {
        position: relative;
        display: block;
        overflow: hidden;
        aspect-ratio: 4 / 3;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        background: #111923;
        color: #fff;
        text-decoration: none;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.26);
      }

      .gallery img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        transition: transform 260ms ease, filter 260ms ease;
      }

      .gallery span {
        position: absolute;
        left: 10px;
        bottom: 10px;
        padding: 6px 8px;
        border-radius: 4px;
        background: rgba(4, 8, 12, 0.72);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .gallery a:hover img {
        transform: scale(1.045);
        filter: saturate(1.12) contrast(1.05);
      }

      @media (max-width: 700px) {
        main {
          width: min(100% - 24px, 520px);
          padding-top: 74px;
        }

        .intro h1 {
          font-size: 42px;
        }
      }
    </style>
  </head>
  <body>
    <script src="./common/preload.js"></script>
    <main>
      <section class="intro">
        <h1>Art of WebGL Website</h1>
        <p>
          A static gallery of real-time WebGL rendering sessions, organized as independent shader,
          geometry, framebuffer, and post-processing studies.
        </p>
